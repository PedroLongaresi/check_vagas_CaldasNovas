name: Monitoramento de Vagas Sesc

on:
  schedule:
    - cron: '0 11,15,18,21 * * *'
  workflow_dispatch:

jobs:
  verificar_disponibilidade:
    runs-on: ubuntu-latest
    
    steps:
      - name: Requisição para a API do Sesc
        id: fetch_api
        run: |
          curl -s -X GET "https://portalturismoapi.sescgo.com.br/api/v1/reservas/disponibilidade/2026-12-01/2026-12-15/1,1,/null/N/1/1/%7B%7D/%7B%7D?SescUnidade=1&ReservaId=0&regimepensao=CAJ" \
            -H "accept: application/json, text/javascript, */*; q=0.01" \
            -H "accept-language: pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7,es;q=0.6" \
            -H "sec-ch-ua: \"Google Chrome\";v=\"147\", \"Not.A/Brand\";v=\"8\", \"Chromium\";v=\"147\"" \
            -H "sec-ch-ua-mobile: ?0" \
            -H "sec-ch-ua-platform: \"Windows\"" \
            -H "sec-fetch-dest: empty" \
            -H "sec-fetch-mode: cors" \
            -H "sec-fetch-site: same-site" \
            -H "Referer: https://portalturismo.sescgo.com.br/" \
            -o resposta.json

      - name: Analisar retorno e validar vagas
        id: validar_vagas
        run: |
          QTD_VAGAS=$(jq '.[0].disponibilidadeApartamento | length' resposta.json)
          
          if [ "$QTD_VAGAS" -gt 0 ]; then
            echo "Vagas encontradas."
            echo "tem_vaga=true" >> $GITHUB_OUTPUT
          else
            MENSAGEM=$(jq -r '.[0].mensagem' resposta.json)
            echo "Status: Não há vagas ou o período não abriu."
            if [ "$MENSAGEM" != "null" ]; then
              echo "Motivo reportado pela API: $MENSAGEM"
            fi
            echo "tem_vaga=false" >> $GITHUB_OUTPUT
          fi

      - name: Enviar Notificação via Telegram (Com Vagas)
        if: steps.validar_vagas.outputs.tem_vaga == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text=" ✅ 🚨 ✅  EXISTEM VAGAS DISPONÍVEIS NO SESC! Acesse o sistema para realizar a reserva."

      - name: Enviar Notificação via Telegram (Sem Vagas)
        if: steps.validar_vagas.outputs.tem_vaga == 'false'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌❌❌❌ NAO EXISTEM VAGAS DISPONÍVEIS NO SESC! "
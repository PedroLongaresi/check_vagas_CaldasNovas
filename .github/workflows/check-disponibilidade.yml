name: Verificar Disponibilidade SESC

on:
  schedule:
    - cron: '0 11,15,19 * * *'  # Roda Ă s 08:00, 12:00 e 16:00 BrasĂ­lia (UTC-3)
  workflow_dispatch:       # Permite rodar manualmente

jobs:
  check-availability:
    name: Consultar Disponibilidade
    runs-on: ubuntu-latest

    env:
      # API_URL: "https://portalturismoapi.sescgo.com.br/api/v1/reservas/disponibilidade/2026-12-01/2026-12-07/1,1,/null/N/1/1/%7B%7D/%7B%7D"
      API_URL: "https://portalturismoapi.sescgo.com.br/api/v1/reservas/disponibilidade/2026-08-09/2026-08-15/1,1,/null/N/2/1/%7B%7D/%7B%7D"
      QUERY_PARAMS: "SescUnidade=2&ReservaId=0"
      # QUERY_PARAMS: "SescUnidade=1&ReservaId=0&regimepensao=CAJ"

    steps:
      - name: Chamar API de Disponibilidade
        id: api_call
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${API_URL}?${QUERY_PARAMS}" \
            -H "accept: application/json, text/javascript, */*; q=0.01" \
            -H "accept-language: pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7" \
            -H "Referer: https://portalturismo.sescgo.com.br/")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "=== STATUS HTTP: $HTTP_STATUS ==="
          echo "=== BODY ==="
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

      - name: Validar Resposta
        id: validate
        run: |
          HTTP_STATUS="${{ steps.api_call.outputs.http_status }}"
          BODY='${{ steps.api_call.outputs.body }}'

          STATUS_EMOJI="âś…"
          STATUS_MSG="Consulta realizada com sucesso"
          DISPONIBILIDADE=""
          EXIT_CODE=0

          if [ "$HTTP_STATUS" -ne 200 ]; then
            STATUS_EMOJI="âťŚ"
            STATUS_MSG="Erro na requisiĂ§ĂŁo â€” Status HTTP: $HTTP_STATUS"
            EXIT_CODE=1
          else
            echo "$BODY" | python3 -m json.tool > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              STATUS_EMOJI="âťŚ"
              STATUS_MSG="Resposta nĂŁo Ă© um JSON vĂˇlido"
              EXIT_CODE=1
            else
              HAS_ITEMS=$(echo "$BODY" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('data', d.get('items', d.get('result', [])))
              count = len(items) if isinstance(items, list) else 'N/A'
              print(count)
          except:
              print('N/A')
          " 2>/dev/null)

              if [ "$HAS_ITEMS" = "0" ]; then
                DISPONIBILIDADE="âš ď¸Ź Nenhuma disponibilidade encontrada"
              elif [ "$HAS_ITEMS" != "N/A" ]; then
                DISPONIBILIDADE="đź›Źď¸Ź Disponibilidade encontrada: $HAS_ITEMS item(s)"
              else
                DISPONIBILIDADE="â„ąď¸Ź Dados retornados (verifique a estrutura do JSON)"
              fi

              PERIODO_LIBERADO=true
              if echo "$BODY" | grep -q "PerĂ­odo ainda nĂŁo liberado para venda"; then
                PERIODO_LIBERADO=false
                DISPONIBILIDADE="đź“… PerĂ­odo ainda nĂŁo liberado para venda"
              fi
            fi
          fi

          echo "status_emoji=$STATUS_EMOJI"       >> $GITHUB_OUTPUT
          echo "status_msg=$STATUS_MSG"           >> $GITHUB_OUTPUT
          echo "disponibilidade=$DISPONIBILIDADE" >> $GITHUB_OUTPUT
          echo "periodo_liberado=$PERIODO_LIBERADO" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

      - name: Notificar Telegram - Sucesso
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HTTP_STATUS: ${{ steps.api_call.outputs.http_status }}
          DISPONIBILIDADE: ${{ steps.validate.outputs.disponibilidade }}
          PERIODO_LIBERADO: ${{ steps.validate.outputs.periodo_liberado }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TIMESTAMP=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')

          if [ "$PERIODO_LIBERADO" = "false" ]; then
            MESSAGE="đź“… *SESC â€” PerĂ­odo ainda nĂŁo liberado*\n\nđź—“ď¸Ź PerĂ­odo: 01/12/2026 â†’ 07/12/2026\nđźŹ¨ Unidade: 1 | Regime: CAJ\n\nâŹ° $TIMESTAMP (BrasĂ­lia)\nđź”— [Ver no GitHub Actions]($RUN_URL)"
          else
            MESSAGE=$(printf "âś… *SESC â€” Consulta OK*\n\nđź—“ď¸Ź PerĂ­odo: 01/12/2026 â†’ 07/12/2026\nđźŹ¨ Unidade: 1 | Regime: CAJ\nđź“ˇ Status HTTP: %s\n%s\n\nâŹ° %s (BrasĂ­lia)\nđź”— [Ver no GitHub Actions](%s)" \
              "$HTTP_STATUS" "$DISPONIBILIDADE" "$TIMESTAMP" "$RUN_URL")
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "parse_mode=Markdown"

      - name: Notificar Telegram - Erro
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HTTP_STATUS: ${{ steps.api_call.outputs.http_status }}
          STATUS_MSG: ${{ steps.validate.outputs.status_msg }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TIMESTAMP=$(TZ="America/Sao_Paulo" date '+%d/%m/%Y %H:%M:%S')
          MESSAGE=$(printf "âťŚ *SESC â€” Falha na Consulta*\n\nđź—“ď¸Ź PerĂ­odo: 01/12/2026 â†’ 07/12/2026
          đźŹ¨ Unidade: 1  
          Regime: CAJ\nđź“ˇ Status HTTP: %s\nâš ď¸Ź %s\n\nâŹ° %s (BrasĂ­lia)\nđź”— [Ver detalhes](%s)" \
            "$HTTP_STATUS" "$STATUS_MSG" "$TIMESTAMP" )

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "parse_mode=Markdown"

      - name: Resumo do Job
        if: always()
        run: |
          echo "## đź“‹ Resumo da VerificaĂ§ĂŁo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| đź—“ď¸Ź PerĂ­odo | 01/12/2026 â†’ 07/12/2026 |" >> $GITHUB_STEP_SUMMARY
          echo "| đźŹ¨ Unidade SESC | 1 |" >> $GITHUB_STEP_SUMMARY
          echo "| đźŤ˝ď¸Ź Regime | CAJ |" >> $GITHUB_STEP_SUMMARY
          echo "| đź“ˇ Status HTTP | ${{ steps.api_call.outputs.http_status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ steps.validate.outputs.status_emoji }} Status | ${{ steps.validate.outputs.status_msg }} |" >> $GITHUB_STEP_SUMMARY
          echo "| đź“… PerĂ­odo Liberado | ${{ steps.validate.outputs.periodo_liberado }} |" >> $GITHUB_STEP_SUMMARY
          echo "| âŹ° Executado em | $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S') (BrasĂ­lia) |" >> $GITHUB_STEP_SUMMARY